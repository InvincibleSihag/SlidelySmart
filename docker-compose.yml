services:
  web:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 9753 --reload
             --reload-dir /app/app --reload-dir /app/prompts
             --reload-dir /app/templates --reload-dir /app/skills"
    ports:
      - "9753:9753"
    env_file: .local.env
    environment:
      DATABASE_URL: postgresql://slidely:slidely@db:5432/slidely
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PORT: "9753"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - /app/venv

  worker:
    build: .
    command: >
      sh -c "watchfiles --filter python
      'celery -A app.services.celery_app worker --loglevel=info -P solo'
      app/"
    env_file: .local.env
    environment:
      DATABASE_URL: postgresql://slidely:slidely@db:5432/slidely
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - /app/venv

  frontend:
    build:
      context: ./AasumSlidely
      target: dev
    command: >
      sh -c "npm install && npm run dev -- --host :: --port 3000"
    ports:
      - "3000:3000"
    environment:
      API_PROXY_TARGET: http://web:9753
      VITE_PUSHER_KEY: dfb6c7d621fe783518a5
      VITE_PUSHER_CLUSTER: ap2
    depends_on:
      - web
    volumes:
      - ./AasumSlidely:/app
      - frontend_node_modules:/app/node_modules

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slidely
      POSTGRES_USER: slidely
      POSTGRES_PASSWORD: slidely
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slidely"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
  frontend_node_modules:
